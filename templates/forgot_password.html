{% extends 'base.html' %}

{% block title %}Forgot Password - INKBIT LMS{% endblock %}

{% block content %}
<div class="auth-wrapper" style="max-width: 450px; margin: 4rem auto; padding: 1rem;">
    <div class="auth-header" style="text-align: center; margin-bottom: 2rem;">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="INKBIT Logo" class="auth-logo" style="height: 80px; margin-bottom: 1rem;">
        <h1>Recover Password</h1>
        <p style="color: var(--text-secondary); margin-top: -0.5rem;">Request a password reset OTP for your account</p>
    </div>

    <div class="glass-card" style="padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(7, 10, 19, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);">
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="form-group">
                <label for="forgot-email-input" class="form-label">Email Address</label>
                <input type="email" id="forgot-email-input" name="email" class="form-control" placeholder="e.g. name@domain.com" required style="padding-left: 1rem;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.75rem; padding: 0.85rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                Send Recovery OTP
            </button>
        </form>

        <div style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 1.5rem;">
            Back to <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
